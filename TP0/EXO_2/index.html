<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Sondage</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <form action="#" method="POST">
        <fieldset>
            <legend>Pizzas</legend>
            <p>Parmi la liste quelle est votre pizza préférée ? (un seul choix possible)</p>

            <div class="item_pizza">
                <input type="radio" id="marg" name="pizza" value="marguarita">
                <label for="marg">Marguarita</label>
            </div>
            <div class="item_pizza">
                <input type="radio" id="napo" name="pizza" value="napolitaine">
                <label for="napo">Napolitaine</label>
            </div>
            <div class="item_pizza">
                <input type="radio" id="reine" name="pizza" value="reine">
                <label for="reine">Reine</label>
            </div>
            </fieldset>

        <fieldset>
            <legend>Fruits</legend>
            <p>Quels sont vos fruits préférés ? (plusieurs choix possibles)</p>

            <div class="item_fruit">
                <input type="checkbox" id="frai" name="fruits" value="fraises">
                <label for="frai">Fraises</label>
            </div>
            <div class="item_fruit">
                <input type="checkbox" id="fram" name="fruits" value="framboises">
                <label for="fram">Framboises</label>
            </div>
            </fieldset>

        <br>
        <input type="submit" value="Envoyer">
    </form>
</body>
</html>
